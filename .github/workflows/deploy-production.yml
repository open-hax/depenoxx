name: deploy-production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: depenoxx-production
  cancel-in-progress: false

jobs:
  production-preflight:
    name: production-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: pnpm run build

  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - production-preflight
    environment: production
    steps:
      - uses: actions/checkout@v5
      - name: configure production ssh
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${PRODUCTION_SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host *\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          touch ~/.ssh/known_hosts
          ssh-keyscan -H "${PRODUCTION_HOST}" >> ~/.ssh/known_hosts
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_SSH_HOST || 'ussy.promethean.rest' }}
          PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
      - run: chmod +x scripts/*.sh
      - name: deploy production runtime
        run: ./scripts/deploy-remote.sh
        env:
          DEPLOY_HOST: ${{ vars.PRODUCTION_SSH_HOST || 'ussy.promethean.rest' }}
          DEPLOY_USER: ${{ vars.PRODUCTION_SSH_USER || 'error' }}
          DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH || '~/devel/services/depenoxx' }}
          DEPLOY_COMPOSE_PROJECT_NAME: depenoxx
          DEPLOY_PUBLIC_HOST: ${{ vars.PRODUCTION_PUBLIC_HOST || 'depenoxx.promethean.rest' }}
          DEPLOY_ENABLE_TLS: 'false'
          DEPLOY_HEALTH_TIMEOUT_SECONDS: '120'
          DEPLOY_ENV_APPEND: |
            PROJECT_NAME=depenoxx
      - name: production deploy failure logs
        if: failure()
        run: |
          ssh ${PRODUCTION_SSH_USER}@${PRODUCTION_HOST} "cd ${PRODUCTION_PATH} && docker compose --project-name depenoxx ps && docker compose --project-name depenoxx logs --tail=200"
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_SSH_HOST || 'ussy.promethean.rest' }}
          PRODUCTION_SSH_USER: ${{ vars.PRODUCTION_SSH_USER || 'error' }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH || '~/devel/services/depenoxx' }}

  verify-production:
    name: verify-production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - deploy-production
    environment: production
    steps:
      - run: |
          for attempt in $(seq 1 20); do
            echo "health-check attempt ${attempt}" >/dev/null
            if curl -fsS "${PRODUCTION_BASE_URL}/api/health" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1
        env:
          PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL || 'https://depenoxx.promethean.rest' }}
